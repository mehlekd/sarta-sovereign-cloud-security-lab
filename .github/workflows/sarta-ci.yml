name: SARTA Policy Engine CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository contents (debug)
        run: |
          echo "=== WORKSPACE ==="
          pwd
          echo "=== FILE TREE ==="
          ls -R

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Run validation (safe mode)
        run: |
          if [ -f resilience/validate_policies.py ]; then
            echo "Found script, running..."
            python3 resilience/validate_policies.py
          else
            echo "ERROR: resilience/validate_policies.py NOT FOUND"
            exit 1
          fi