name: SARTA Policy Engine CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace (DEBUG)
        run: |
          echo "=== WORKING DIRECTORY ==="
          pwd
          echo "=== FULL REPOSITORY TREE ==="
          ls -R

      - name: Verify resilience folder exists
        run: |
          if [ -d "./resilience" ]; then
            echo "resilience folder FOUND"
          else
            echo "resilience folder NOT FOUND"
            exit 1
          fi

      - name: Verify validate script exists (robust check)
        run: |
          echo "Checking file..."
          ls -la ./resilience || true

          if [ -f "./resilience/validate_policies.py" ]; then
            echo "VALIDATION SCRIPT FOUND"
          else
            echo "VALIDATION SCRIPT MISSING"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Run validation script
        run: |
          echo "Running validation script..."
          python3 ./resilience/validate_policies.py