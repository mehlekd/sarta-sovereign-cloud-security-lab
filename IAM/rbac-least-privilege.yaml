(Identity Access Management - Rules and Governance)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sarta-least-privilege-workload
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sarta-enforce-workload-binding
subjects:
  - kind: ServiceAccount
    name: ai-inference-sa
    namespace: core-ai-enclave
roleRef:
  kind: ClusterRole
  name: sarta-least-privilege-workload
  apiGroup: rbac.authorization.k8s.io
